version: '3.8'

services:
  novafuse-egp-vs:
    build: .
    volumes:
      - ./artifacts:/harness/verifier/artifacts
    working_dir: /harness/verifier
    command: ["pwsh", "-Command", "./verify.ps1"]
    
  # Optional: Run directly on host (for assessors)
  novafuse-egp-vs-native:
    image: mcr.microsoft.com/powershell:7.2-nanoserver-1809
    volumes:
      - .:/harness
    working_dir: /harness/verifier
    command: ["pwsh", "-Command", "./verifier/verify.ps1"]
