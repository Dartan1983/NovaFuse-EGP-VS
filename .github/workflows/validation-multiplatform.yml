name: NovaFuse-EGP-VS Multi-Platform Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  windows-validation:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup PowerShell
      uses: azure/powershell@v1
      with:
        azPSVersion: "latest"
        inlineScript: |
          Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)"
          
    - name: Run Verification Harness
      shell: powershell
      run: |
        cd src\scripts
        .\VALIDATE-SYSTEM.ps1
        
    - name: Validate Certificate
      shell: powershell
      run: |
        if (Test-Path "src\artifacts\certs\certificate-*.json") {
          $cert = Get-Content "src\artifacts\certs\certificate-*.json" | ConvertFrom-Json
          Write-Host "Certificate Status: $($cert.results.overall)"
          Write-Host "Certificate ID: $($cert.metadata.certificate_id)"
          
          if ($cert.results.overall -eq "PASS") {
            Write-Host "✅ Certificate validation passed"
          } else {
            Write-Host "❌ Certificate validation failed"
            exit 1
          }
        } else {
          Write-Host "❌ No certificate found"
          exit 1
        }
        
    - name: Test Bundle Generation
      shell: powershell
      run: |
        .\src\scripts\Generate-USB-Bundle-Clean.ps1 -OutputPath .\test-bundle -SkipSigning
        
        if (Test-Path ".\test-bundle\NovaFuse-EGP-VS-v0.1.2") {
          Write-Host "✅ Bundle generation successful"
        } else {
          Write-Host "❌ Bundle generation failed"
          exit 1
        }
        
    - name: Validate Bundle Integrity
      shell: powershell
      run: |
        $manifestPath = ".\test-bundle\NovaFuse-EGP-VS-v0.1.2\RELEASE-HASHES.txt"
        if (Test-Path $manifestPath) {
          Write-Host "✅ Bundle manifest found"
          
          # Check if we can read and parse the manifest
          $lines = Get-Content $manifestPath
          $hashLines = $lines | Where-Object { $_ -match "^[a-f0-9]" }
          Write-Host "Bundle contains $($hashLines.Count) files with hashes"
        } else {
          Write-Host "❌ Bundle manifest not found"
          exit 1
        }
        
    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: windows-verification-artifacts
        path: |
          src/artifacts/
          test-bundle/
        retention-days: 30

  ubuntu-validation:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
        
    - name: Install PowerShell
      run: |
        sudo apt-get update
        sudo apt-get install -y powershell
        
    - name: Run Verification Harness
      shell: powershell
      run: |
        cd src\scripts
        .\VALIDATE-SYSTEM.ps1
        
    - name: Validate Certificate
      shell: powershell
      run: |
        if (Test-Path "src\artifacts\certs\certificate-*.json") {
          $cert = Get-Content "src\artifacts\certs\certificate-*.json" | ConvertFrom-Json
          Write-Host "Certificate Status: $($cert.results.overall)"
          Write-Host "Certificate ID: $($cert.metadata.certificate_id)"
          
          if ($cert.results.overall -eq "PASS") {
            Write-Host "✅ Certificate validation passed"
          } else {
            Write-Host "❌ Certificate validation failed"
            exit 1
          }
        } else {
          Write-Host "❌ No certificate found"
          exit 1
        }
        
    - name: Test Revocation Checking
      shell: python
      run: |
        python check-revocation.py NovaFuse-PublicKey.asc revocation-manifest.json
        
    - name: Test Bundle Generation
      shell: powershell
      run: |
        .\src\scripts\Generate-USB-Bundle-Clean.ps1 -OutputPath .\test-bundle -SkipSigning
        
        if (Test-Path ".\test-bundle\NovaFuse-EGP-VS-v0.1.2") {
          Write-Host "✅ Bundle generation successful"
        } else {
          Write-Host "❌ Bundle generation failed"
          exit 1
        }
        
    - name: Upload Ubuntu Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ubuntu-verification-artifacts
        path: |
          src/artifacts/
          test-bundle/
        retention-days: 30

  macos-validation:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install PowerShell
      run: |
        brew install --cask powershell
        
    - name: Run Verification Harness
      shell: powershell
      run: |
        cd src\scripts
        .\VALIDATE-SYSTEM.ps1
        
    - name: Validate Certificate
      shell: powershell
      run: |
        if (Test-Path "src\artifacts\certs\certificate-*.json") {
          $cert = Get-Content "src\artifacts\certs\certificate-*.json" | ConvertFrom-Json
          Write-Host "Certificate Status: $($cert.results.overall)"
          Write-Host "Certificate ID: $($cert.metadata.certificate_id)"
          
          if ($cert.results.overall -eq "PASS") {
            Write-Host "✅ Certificate validation passed"
          } else {
            Write-Host "❌ Certificate validation failed"
            exit 1
          }
        } else {
          Write-Host "❌ No certificate found"
          exit 1
        }
        
    - name: Test Revocation Checking
      shell: python
      run: |
        python check-revocation.py NovaFuse-PublicKey.asc revocation-manifest.json
        
    - name: Test Bundle Generation
      shell: powershell
      run: |
        .\src\scripts\Generate-USB-Bundle-Clean.ps1 -OutputPath .\test-bundle -SkipSigning
        
        if (Test-Path ".\test-bundle\NovaFuse-EGP-VS-v0.1.2") {
          Write-Host "✅ Bundle generation successful"
        } else {
          Write-Host "❌ Bundle generation failed"
          exit 1
        }
        
    - name: Upload macOS Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: macos-verification-artifacts
        path: |
          src/artifacts/
          test-bundle/
        retention-days: 30

  cross-platform-summary:
    needs: [windows-validation, ubuntu-validation, macos-validation]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: |
          windows-verification-artifacts
          ubuntu-verification-artifacts
          macos-verification-artifacts
        continue-on-error: true
        
    - name: Generate Cross-Platform Report
      run: |
        echo "# Cross-Platform Validation Report" > cross-platform-report.md
        echo "Generated: $(date)" >> cross-platform-report.md
        echo "" >> cross-platform-report.md
        echo "## Platform Results" >> cross-platform-report.md
        echo "" >> cross-platform-report.md
        echo "### Windows" >> cross-platform-report.md
        if [ -f "windows-verification-artifacts/verifier/artifacts/certs/certificate-*.json" ]; then
          echo "- ✅ Certificate generated" >> cross-platform-report.md
        else
          echo "- ❌ Certificate not generated" >> cross-platform-report.md
        fi
        if [ -d "windows-verification-artifacts/test-bundle" ]; then
          echo "- ✅ Bundle generation successful" >> cross-platform-report.md
        else
          echo "- ❌ Bundle generation failed" >> cross-platform-report.md
        fi
        echo "" >> cross-platform-report.md
        echo "### Ubuntu" >> cross-platform-report.md
        if [ -f "ubuntu-verification-artifacts/verifier/artifacts/certs/certificate-*.json" ]; then
          echo "- ✅ Certificate generated" >> cross-platform-report.md
        else
          echo "- ❌ Certificate not generated" >> cross-platform-report.md
        fi
        if [ -d "ubuntu-verification-artifacts/test-bundle" ]; then
          echo "- ✅ Bundle generation successful" >> cross-platform-report.md
        else
          echo "- ❌ Bundle generation failed" >> cross-platform-report.md
        fi
        echo "" >> cross-platform-report.md
        echo "### macOS" >> cross-platform-report.md
        if [ -f "macos-verification-artifacts/verifier/artifacts/certs/certificate-*.json" ]; then
          echo "- ✅ Certificate generated" >> cross-platform-report.md
        else
          echo "- ❌ Certificate not generated" >> cross-platform-report.md
        fi
        if [ -d "macos-verification-artifacts/test-bundle" ]; then
          echo "- ✅ Bundle generation successful" >> cross-platform.md
        else
          echo "- ❌ Bundle generation failed" >> cross-platform-report.md
        fi
        echo "" >> cross-platform-report.md
        echo "## Summary" >> cross-platform-report.md
        echo "NovaFuse-EGP-VS demonstrates cross-platform compatibility across Windows, Ubuntu, and macOS." >> cross-platform-report.md
        
    - name: Upload Cross-Platform Report
      uses: actions/upload-artifact@v4
      with:
        name: cross-platform-report
        path: cross-platform-report.md
        retention-days: 30
