name: NovaFuse-EGP-VS Multi-Platform Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install PowerShell (pwsh) on non-Windows via .NET global tool
    - name: Setup .NET (non-Windows)
      if: runner.os != 'Windows'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install PowerShell (non-Windows)
      if: runner.os != 'Windows'
      run: |
        dotnet tool install --global PowerShell
        echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
        pwsh -v

    - name: Set ExecutionPolicy (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force

    - name: Locate validation script
      id: find_script
      shell: bash
      run: |
        set -euo pipefail
        
        candidates=(
          "QUICK-VALIDATE.ps1"
          "Validate.ps1"
          "scripts/QUICK-VALIDATE.ps1"
          "tools/QUICK-VALIDATE.ps1"
        )
        
        found=""
        for c in "${candidates[@]}"; do
          if [[ -f "$c" ]]; then
            found="$c"
            break
          fi
        done
        
        if [[ -z "$found" ]]; then
          match=$(git ls-files | grep -iE '(^|/)(QUICK-VALIDATE|Validate)\.ps1$' | head -n1 || true)
          if [[ -n "$match" ]]; then
            found="$match"
          fi
        fi
        
        if [[ -z "$found" ]]; then
          echo "Validation script not found (looked for QUICK-VALIDATE.ps1 / Validate.ps1)" >&2
          exit 1
        fi
        
        echo "script=$found" >> "$GITHUB_OUTPUT"
        echo "Found script: $found"

    - name: Run validation
      run: pwsh -File "${{ steps.find_script.outputs.script }}"

    - name: Collect artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-verification-artifacts
        path: |
          **/*.log
          test-results/
          artifacts/
        if-no-files-found: ignore

  cross-platform-summary:
    name: Cross-platform summary
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: cross-platform-artifacts
        merge-multiple: true

    - name: Generate summary
      shell: bash
      continue-on-error: true
      run: |
        echo "## Cross-platform results" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "Artifacts downloaded to cross-platform-artifacts:" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        ls -R cross-platform-artifacts >> "$GITHUB_STEP_SUMMARY" || true
        echo '```' >> "$GITHUB_STEP_SUMMARY"
