name: NovaFuse-EGP-VS Multi-Platform Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    defaults:
      run:
        shell: ${{ runner.os == 'Windows' && 'powershell' || 'pwsh' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup PowerShell (Ubuntu/macOS)
      if: runner.os != 'Windows'
      run: |
        if command -v pwsh >/dev/null 2>&1; then
          echo "PowerShell Core found"
          pwsh --version
        else
          echo "Installing PowerShell Core..."
          if [ "$RUNNER_OS" = "Linux" ]; then
            wget -q https://packages.microsoft.com/config/ubuntu/20.04/packages-microsoft-prod.deb
            sudo dpkg -i packages-microsoft-prod.deb
            sudo apt-get update
            sudo apt-get install -y powershell
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install powershell/tap/powershell
          fi
        fi

    - name: Set execution policy (Windows)
      if: runner.os == 'Windows'
      run: Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force

    - name: Generate test bundle
      run: |
        if (Test-Path 'src/scripts/Generate-USB-Bundle-Clean.ps1') {
          & 'src/scripts/Generate-USB-Bundle-Clean.ps1' -OutputPath './test-bundle' -SkipSigning
        } else {
          Write-Error 'Bundle generation script not found'
          exit 1
        }

    - name: Locate validation script
      id: find_script
      run: |
        $ErrorActionPreference = 'Stop'
        
        $candidates = @(
          'QUICK-VALIDATE.ps1',
          'Validate.ps1',
          'scripts/QUICK-VALIDATE.ps1',
          'tools/QUICK-VALIDATE.ps1'
        )
        
        $found = $null
        foreach ($c in $candidates) {
          if (Test-Path $c) { $found = $c; break }
        }
        
        if (-not $found) {
          $match = Get-ChildItem -Recurse -Filter 'QUICK-VALIDATE.ps1' -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($match) { $found = $match.FullName }
        }
        
        if (-not $found) {
          Write-Error 'Validation script not found (looked for QUICK-VALIDATE.ps1 / Validate.ps1).'
        }
        
        "script=$found" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Run validation
      run: ${{ runner.os == 'Windows' && 'powershell -File' || 'pwsh -File' }} "${{ steps.find_script.outputs.script }}"

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: egp-validation-${{ runner.os }}-${{ github.run_number }}
        path: |
          test-bundle/
          src/artifacts/
        retention-days: 7
